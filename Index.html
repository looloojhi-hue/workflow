                    className="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white transition-colors" 
                  />
                </div>
                <div className="p-6 overflow-y-auto flex-1 space-y-2">
                  {safeReports.filter(r => 
                    r.id !== report.id && 
                    (linkSearchTerm === '' || 
                    (r.title || '').includes(linkSearchTerm) || 
                    (r.author || '').includes(linkSearchTerm))
                  ).slice(0, 50).map(r => { 
                    const isChecked = tempLinkedReports.some(lr => lr.id === r.id);
                    return (
                      <label key={r.id} className="flex items-start gap-3 p-3 hover:bg-slate-50 rounded-lg cursor-pointer border border-transparent hover:border-slate-200 transition-colors">
                        <input type="checkbox" checked={isChecked} onChange={() => toggleLinkedReport(r)} className="mt-1 w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer"/>
                        <div className="flex flex-col">
                          <span className="text-sm font-bold text-slate-800">{r.title}</span>
                          <span className="text-xs text-slate-500 mt-0.5">{r.reportDate} | {r.dept} {r.team} | {r.author}</span>
                        </div>
                      </label>
                    );
                  })}
                  {safeReports.length <= 1 && (
                    <div className="text-center py-10 text-slate-400 text-sm">연결 가능한 다른 보고서가 없습니다.</div>
                  )}
                </div>
                <div className="px-6 py-4 border-t border-gray-100 flex justify-between items-center">
                  <span className="text-sm text-blue-600 font-bold">{tempLinkedReports.length}개 선택됨</span>
                  <div className="flex gap-2">
                    <button onClick={() => setIsLinkModalOpen(false)} className="px-5 py-2 bg-white border border-slate-300 text-slate-600 font-bold rounded-xl hover:bg-slate-100 transition-colors">취소</button>
                    <button onClick={handleSaveLinkedReports} disabled={isLinkingSubmitting} className="px-6 py-2 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-sm flex items-center gap-2">
                      {isLinkingSubmitting ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : '저장 완료'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // =========================================================================
    // 🚨 [직책자 대시보드 뷰 - 활성 필터링 + 3단 분리 + 스마트 전결 대응 완벽 적용본]
    // =========================================================================
    const ExecutiveDashboard = ({ setActiveMenu, reports, userData, handleReportClick }) => {
      
      // 1. 방어적 코드: reports가 정상적인 배열이 아니면 빈 배열로 강제 처리
      const safeReports = Array.isArray(reports) ? reports : [];
      // userData가 렌더링 직전에 꼬일 것을 대비한 안전장치
      const userRole = userData?.role || '팀원';

      // 🚨 [더보기 상태 관리] 각 섹션별로 현재 몇 개까지 보여줄지 상태(State)를 저장합니다. 기본값 3개.
      const [displayLimits, setDisplayLimits] = useState({
        action: 3,
        subordinate: 3,
        shared: 3
      });

      // 더보기 버튼 클릭 시 호출되는 함수 (기존 개수 + 3개 추가)
      const loadMore = (section) => {
        setDisplayLimits(prev => ({ ...prev, [section]: prev[section] + 3 }));
      };

      const now = new Date();
      const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

      // 🚨 [핵심 수정 1] '활성 보고서(Active Reports)' 필터링 기준 변경 (스마트 전결 대응)
      const activeReports = safeReports.filter(r => {
        if (!r) return false;
        const statusStr = String(r.status || '');
        
        // 조건 A: '대기' 또는 '반려' 상태인 문서는 진행 중이므로 무조건 노출
        if (statusStr.includes('대기') || statusStr.includes('반려')) return true;
        
        // 🚨 조건 B: 승인이 '완료'된 문서는 오직 '최근 7일 이내'에 보고된(reportDate) 것만 노출
        // ('팀장 승인 완료', '실장 승인 완료', '본부장 승인 완료' 모두 포함하기 위해 '승인 완료'로 유연하게 검사)
        if (statusStr.includes('승인 완료') || statusStr.includes('최종 승인')) {
          if (!r.reportDate) return false; // 보고일자 데이터로 확인
          const d = new Date(r.reportDate);
          return !isNaN(d) && d >= sevenDaysAgo;
        }
        
        return true; 
      });

      // 🚨 [핵심 정렬 로직 추가] 필터링된 보고서들을 '보고일자(reportDate)' 기준 내림차순(최신순)으로 정렬
      activeReports.sort((a, b) => new Date(b.reportDate) - new Date(a.reportDate));

      // 2. 미확인 보고서 (안 읽은 문서 카운트)
      const unreadCount = activeReports.filter(r => r && !r.isRead).length;
      
      // 3. 결재/피드백 대기 카운트 
      const pendingCount = activeReports.filter(r => {
        if (!r) return false;
        const s = String(r.status || '');
        return s.includes(userRole) && s.includes('대기');
      }).length;

      // 🚨 [핵심 수정 2] 금주 누적 보고 카운트 (최근 7일 이내 문서) 기준을 보고일자(reportDate)로 변경
      const weeklyReports = activeReports.filter(r => {
        if (!r || !r.reportDate) return false; // 보고일자 데이터로 확인
        const d = new Date(r.reportDate);
        return !isNaN(d) && d >= sevenDaysAgo; 
      });
      const weeklyCount = weeklyReports.length;

      // 5. 부서별 주간 보고 트렌드 미니 차트 가공 (Top 3 + 기타 하이브리드 로직)
      const teamCounts = {};
      weeklyReports.forEach(r => {
         const t = r.team || '소속미상';
         teamCounts[t] = (teamCounts[t] || 0) + 1; // 소속별 건수 집계
      });
      // 건수 기준 내림차순 정렬
      const allSortedTeams = Object.entries(teamCounts).sort((a,b) => b[1] - a[1]); 
      
      // 상위 3개 팀과 나머지 팀 분리 로직
      let displayTeams = [];
      let maxCount = 1;
      if (allSortedTeams.length > 0) {
        maxCount = allSortedTeams[0][1];
        if (allSortedTeams.length <= 3) {
          // 전체 팀이 3개 이하면 그대로 렌더링
          displayTeams = allSortedTeams;
        } else {
          // 팀이 4개 이상이면 Top 3만 추출하고, 나머지는 '기타' 항목으로 묶어버림 (본부장급 화면 최적화)
          displayTeams = allSortedTeams.slice(0, 3);
          const othersCount = allSortedTeams.slice(3).reduce((sum, team) => sum + team[1], 0);
          const othersTooltip = allSortedTeams.slice(3).map(t => `${t[0]}: ${t[1]}건`).join(', ');
          displayTeams.push(['기타', othersCount, othersTooltip]); // 3번째 요소로 상세 툴팁 데이터 전달
          
          // '기타'의 합산 건수가 1위(maxCount)보다 높을 수 있으므로 차트 비율을 위해 maxCount 재조정
          maxCount = Math.max(maxCount, othersCount); 
        }
      }

      // 🚨 [방향성 3 핵심 로직] 활성 리포트(activeReports)를 3단으로 자동 분류
      const actionRequiredReports = []; 
      const subordinateReports = [];    
      const sharedReports = [];         

      activeReports.forEach(r => {
        if (!r) return;
        const statusStr = String(r.status || '');
        
        // 분류 조건 1: 내 결재 차례이거나, 내가 쓴 글인데 반려당한 경우
        const isMyTurn = userData.isLeader && statusStr.includes(`${userRole} 대기`);
        const isMyRejected = (r.author === userData.name) && statusStr.includes('반려');
        
        if (isMyTurn || isMyRejected) {
          actionRequiredReports.push(r);
          return; 
        }

        // 🚨 [핵심 수정] 분류 조건 2: 소속 판단 로직 개선 (안전성 강화 및 공백 제거)
        const isMine = r.author === userData.name;
        let isSubordinate = false;
        
        // 1. 값들을 비교하기 전에 띄어쓰기를 싹 다 없애버림 (안전장치)
        const safeMyOffice = String(userData.office || "").trim();
        const safeReportDept = String(r.dept || "").trim();
        const safeReportTeam = String(r.team || "").trim();

        // 본부장: 모든 부서의 문서가 '우리 부서' 문서로 분류됨
        if (userData.role === '본부장') {
          isSubordinate = true; 
        } 
        // 실장: 해당 문서의 '팀(team)'이 내 소속 '실(office)'의 이름과 매칭되는 텍스트를 포함하거나, 백엔드에서 넘겨준 dept가 정확할 때
        else if (userData.role === '실장') {
           const officePrefix = safeMyOffice.replace('실', ''); // '인사실' -> '인사'
           
           // 조건 1: 부서 이름이 완전히 일치하는가?
           const isSameDept = safeReportDept === safeMyOffice;
           // 조건 2: 문서의 팀 이름이 내 실 이름 앞부분을 포함하는가?
           const isTeamMatch = officePrefix && safeReportTeam.includes(officePrefix);
           // 조건 3: 특수 케이스 (인사실은 총무팀을 포함한다)
           const isSpecialCase = (safeMyOffice === '인사실' && safeReportTeam === '총무팀');
           // 조건 4: 보고서 데이터(r.dept)가 비어있을 때를 대비하여, 팀 이름만으로도 실 소속을 유추합니다.
           const isHrTeam = safeMyOffice === '인사실' && safeReportTeam === '인사팀';

           if (isSameDept || isTeamMatch || isSpecialCase || isHrTeam) {
              isSubordinate = true;
           }
        } 
        // 팀장: 해당 문서의 '팀(team)'이 내 소속 '팀(team)'과 일치할 때
        else if (userData.role === '팀장' && safeReportTeam === String(userData.team || "").trim()) {
          isSubordinate = true; 
        }

        if (isMine || isSubordinate) {
          subordinateReports.push(r); 
        } else {
          // 분류 조건 3: 내 소속도 아니고 결재 차례도 아니면 공유/참조 문서!
          sharedReports.push(r);
        }
      });

      // 반복되는 리포트 카드 UI를 그리는 공통 함수 선언
      const renderReportCard = (report, isHighlight = false) => (
        <div 
          key={report.id} 
          onClick={() => handleReportClick(report)} 
          className={`bg-white border ${isHighlight ? 'border-amber-300 shadow-md ring-1 ring-amber-100/50' : 'border-slate-200 shadow-sm'} rounded-2xl p-5 hover:border-blue-300 hover:shadow-md transition-all relative cursor-pointer group`}
        >
          {/* 🚨 [수정 1] 미확인 표시: 날짜를 가리지 않게 왼쪽 상단 뱃지 형태로 변경 */}
          {!report.isRead && (
            <div className="absolute -top-2 -left-2 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm animate-bounce z-10">
              NEW
            </div>
          )}

          <div className="flex justify-between items-start mb-3">
            <div className="flex flex-wrap items-center gap-2">
              <span className={`text-xs font-semibold px-2.5 py-1 rounded-md border ${report.statusColor}`}>{report.status}</span>
              <span className="text-xs bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md font-medium">{report.dept} {report.team}</span>
              
              {/* 🚨 [수정 4] 보고 유형 표시 (서면/대면) - 데이터가 있을 때만 노출 */}
              {report.reportType && (
                <span className="text-[11px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold border border-blue-100">
                  {report.reportType === 'written' ? '서면보고' : '대면보고'}
                </span>
              )}
            </div>
            
            {/* 🚨 [수정 2] 보고일자 명칭 명시 및 빨간점 간섭 제거 (제출일 -> 보고일자로 변경) */}
            <div className="text-right">
              <span className="text-[11px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded">
                보고일자: {report.reportDate}
              </span>
            </div>
          </div>

          <h3 className="text-lg font-bold text-slate-800 mb-1 group-hover:text-blue-600 transition-colors">{report.title}</h3>
          
          {/* 🚨 [수정 3] 보고자 명칭 명시 */}
          <p className="text-sm text-slate-500 flex items-center gap-1 mb-4">
            <Icon name="person" className="text-[14px]" /> 
            <span className="font-medium text-slate-600">보고자:</span> {report.author}
          </p>

          <div className="bg-gradient-to-r from-indigo-50 to-purple-50 p-4 rounded-xl border border-indigo-100/50">
            <div className="flex items-center gap-1.5 text-indigo-700 font-semibold text-sm mb-1.5"><Icon name="auto_awesome" className="text-base" /> Vertex AI 요약</div>
            <p className="text-sm text-slate-700 leading-relaxed line-clamp-2">{report.aiSummary || "요약 정보가 없습니다."}</p>
          </div>
        </div>
      );

      return (
        <div className="space-y-6">
          {/* 상단 4개 KPI 카드 영역 */}
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between transition-all hover:shadow-md">
              <div><p className="text-sm font-medium text-slate-500">미확인 보고서</p><h3 className="text-2xl font-bold text-slate-800 mt-1">{unreadCount}<span className="text-sm font-normal text-slate-400 ml-1">건</span></h3></div>
              <div className="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-blue-600"><Icon name="notifications" className="text-2xl" /></div>
            </div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between transition-all hover:shadow-md">
              <div><p className="text-sm font-medium text-slate-500">결재/피드백 대기</p><h3 className="text-2xl font-bold text-amber-600 mt-1">{pendingCount}<span className="text-sm font-normal text-slate-400 ml-1">건</span></h3></div>
              <div className="w-12 h-12 bg-amber-50 rounded-full flex items-center justify-center text-amber-600"><Icon name="schedule" className="text-2xl" /></div>
            </div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between transition-all hover:shadow-md">
              <div><p className="text-sm font-medium text-slate-500">금주 누적 보고</p><h3 className="text-2xl font-bold text-slate-800 mt-1">{weeklyCount}<span className="text-sm font-normal text-slate-400 ml-1">건</span></h3></div>
              <div className="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600"><Icon name="article" className="text-2xl" /></div>
            </div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between transition-all hover:shadow-md h-[120px]">
              <p className="text-xs font-medium text-slate-500 mb-1">{userRole === '팀장' ? '우리 팀 주간 보고 현황' : '부서별 주간 트렌드 (Top 3)'}</p>
              
              <div className="flex items-end gap-2 h-[70px] pb-4 pt-4 relative mt-auto">
                {displayTeams.length === 0 ? (
                  <p className="text-xs text-slate-300 m-auto pb-2">이번 주 데이터 없음</p>
                ) : (
                  displayTeams.map((teamData, idx) => {
                    const teamName = teamData[0]; const count = teamData[1]; const tooltipData = teamData[2] || `${teamName}: ${count}건`; 
                    const isOthers = teamName === '기타'; const barColor = isOthers ? 'bg-slate-300' : ['bg-blue-500', 'bg-indigo-400', 'bg-sky-400'][idx % 3];
                    const heightPct = Math.max((count / maxCount) * 100, 15); 
                    const shortName = teamName === '기타' ? '기타' : teamName.substring(0, 3);
                    
                    return (
                      <div key={teamName} title={tooltipData} className="flex-1 flex flex-col items-center justify-end h-full relative cursor-pointer group">
                        
                        {/* 막대 그래프 본체 */}
                        <div className={`w-full ${barColor} rounded-t-md transition-all duration-500 group-hover:brightness-110 relative`} style={{ height: `${heightPct}%` }}>
                            
                            {/* 숫자 */}
                            <span className="text-[11px] font-bold text-slate-600 absolute -top-4 w-full text-center left-0">
                              {count}
                            </span>
                            
                        </div>
                        
                        {/* 팀 이름 */}
                        <span className="text-[10px] font-bold text-slate-400 absolute -bottom-5 w-full text-center truncate">
                          {shortName}
                        </span>
                      </div>
                    )
                  })
                )}
              </div>
            </div>
          </div>

          <div className="space-y-10 pt-4">
            
            {/* 🚨 섹션 1. 결재 및 처리 요청 */}
            <div className="animate-[fadeIn_0.3s_ease-out]">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                  <Icon name="assignment_turned_in" className="text-amber-500 text-xl" /> 내가 처리할 보고서 
                  <span className="bg-amber-100 text-amber-700 text-xs px-2.5 py-0.5 rounded-full font-bold">{actionRequiredReports.length}</span>
                </h2>
              </div>
              {actionRequiredReports.length > 0 ? (
                <div className="grid grid-cols-1 gap-4">
                  {actionRequiredReports.slice(0, displayLimits.action).map(r => renderReportCard(r, true))}
                  
                  {actionRequiredReports.length > displayLimits.action && (
                    <button onClick={() => loadMore('action')} className="w-full py-3 mt-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-sm font-bold rounded-xl flex items-center justify-center gap-1 transition-colors">
                      더 보기 ({actionRequiredReports.length - displayLimits.action}건 남음) <Icon name="expand_more" className="text-[18px]" />
                    </button>
                  )}
                </div>
              ) : (
                <div className="flex flex-col items-center justify-center py-12 bg-white border border-dashed border-slate-200 rounded-2xl">
                  <Icon name="done_all" className="text-[40px] text-emerald-400 mb-3" />
                  <p className="text-slate-500 font-bold">모든 결재 및 처리 건을 완료했습니다!</p>
                </div>
              )}
            </div>

            {/* 🚨 섹션 2. 부서 진행/완료 현황 */}
            <div className="animate-[fadeIn_0.4s_ease-out]">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                  <Icon name="domain" className="text-blue-500 text-xl" /> 부서 내 진행 및 최근 완료 보고서
                </h2>
              </div>
              {subordinateReports.length > 0 ? (
                <div className="grid grid-cols-1 gap-4">
                  {subordinateReports.slice(0, displayLimits.subordinate).map(r => renderReportCard(r, false))}
                  
                  {subordinateReports.length > displayLimits.subordinate && (
                    <button onClick={() => loadMore('subordinate')} className="w-full py-3 mt-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-sm font-bold rounded-xl flex items-center justify-center gap-1 transition-colors">
                      더 보기 ({subordinateReports.length - displayLimits.subordinate}건 남음) <Icon name="expand_more" className="text-[18px]" />
                    </button>
                  )}
                </div>
              ) : (
                <div className="text-center py-8 bg-white rounded-xl border border-slate-200 text-slate-400 text-sm">조회된 부서 보고서가 없습니다.</div>
              )}
            </div>

            {/* 🚨 섹션 3. 공유/참조 보고서 */}
            {sharedReports.length > 0 && (
              <div className="animate-[fadeIn_0.5s_ease-out] border-t border-slate-200 pt-8 mt-8">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <Icon name="share" className="text-purple-500 text-xl" /> 공유 및 참조 보고서
                    <span className="bg-purple-100 text-purple-700 text-xs px-2.5 py-0.5 rounded-full font-bold">{sharedReports.length}</span>
                  </h2>
                </div>
                <div className="grid grid-cols-1 gap-4">
                  {sharedReports.slice(0, displayLimits.shared).map(r => renderReportCard(r, false))}
                  
                  {sharedReports.length > displayLimits.shared && (
                    <button onClick={() => loadMore('shared')} className="w-full py-3 mt-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-sm font-bold rounded-xl flex items-center justify-center gap-1 transition-colors">
                      더 보기 ({sharedReports.length - displayLimits.shared}건 남음) <Icon name="expand_more" className="text-[18px]" />
                    </button>
                  )}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    };
    
    // =========================================================================
    // 🚨 [팀원 대시보드 뷰 - (빈 화면 에러 완벽 차단) 90일 필터 + 공유 분리 + 더보기]
    // =========================================================================

    const EmployeeDashboard = ({ setActiveMenu, reports, handleReportClick, userData }) => {
      
      const safeReports = Array.isArray(reports) ? reports : [];
      // 🚨 [에러 차단 핵심] userData가 없더라도 절대 뻗지 않게 안전장치 추가
      const userName = userData?.name || ''; 
      
      const [displayLimits, setDisplayLimits] = useState({
        my: 3,
        shared: 3
      });

      const loadMore = (section) => {
        setDisplayLimits(prev => ({ ...prev, [section]: prev[section] + 3 }));
      };

      const now = new Date();
      const ninetyDaysAgo = new Date(now.getTime() - 90 * 24 * 60 * 60 * 1000);

      // 🚨 [핵심 수정] 필터링 기준을 제출일(rawDate)에서 보고일자(reportDate)로 변경
      const activeReports = safeReports.filter(r => {
        if (!r) return false;
        const statusStr = String(r.status || '');
        
        // 대기 중이거나 반려된 문서는 무조건 노출
        if (statusStr.includes('대기') || statusStr.includes('반려')) return true;
        
        // 완료된 문서는 '보고일자(reportDate)' 기준으로 90일 이내인지 확인
        if (statusStr.includes('승인')) {
          if (!r.reportDate) return false; // 보고일자 데이터가 없으면 안전하게 제외
          
          // 보고일자(예: "2026-04-09")를 Date 객체로 변환
          const d = new Date(r.reportDate);
          
          return !isNaN(d) && d >= ninetyDaysAgo;
        }
        return true; 
      });

      // 🚨 [핵심 추가] 필터링된 보고서들을 보고일자(reportDate) 기준 내림차순(최신순)으로 정렬
      activeReports.sort((a, b) => new Date(b.reportDate) - new Date(a.reportDate));

      const myReports = [];
      const sharedReports = [];

      activeReports.forEach(r => {
        // 🚨 방어 코드가 적용된 userName으로 비교합니다.
        if (r.author === userName) {
          myReports.push(r);
        } else {
          sharedReports.push(r);
        }
      });

      const renderReportCard = (report) => (
        <div key={report.id} onClick={() => handleReportClick(report)} className="bg-white p-4 rounded-xl border border-slate-200 flex items-center justify-between cursor-pointer hover:border-blue-300 hover:shadow-sm transition-all group relative">
          <div className="flex items-center gap-3">
            {!report.isRead && <div className="w-2 h-2 bg-red-500 rounded-full"></div>}
            <div>
              <span className={`text-[10px] font-bold px-2 py-0.5 rounded-sm border ${report.statusColor} mb-1 inline-block`}>{report.status}</span>
              <h4 className="text-md font-semibold text-slate-800 group-hover:text-blue-600 transition-colors">{report.title}</h4>
              <p className="text-xs text-slate-500 mt-1">보고일자: {report.reportDate} <span className="mx-1">|</span> 기안자: {report.author}</p>
            </div>
          </div>
          <button className="text-slate-400 group-hover:text-blue-600 bg-slate-50 p-2 rounded-full"><Icon name="chevron_right" className="text-xl block" /></button>
        </div>
      );

      return (
        <div className="space-y-6">
          <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-8 text-white shadow-lg flex justify-between items-center">
            <div>
              <h2 className="text-2xl font-bold mb-2">새로운 보고서 작성하기</h2>
              <p className="text-blue-100">보고 문서를 업로드하면 AI가 자동으로 요약본을 작성합니다.</p>
            </div>
            <button onClick={() => setActiveMenu('newReport')} className="bg-white text-blue-600 px-6 py-3 rounded-xl font-bold shadow-sm hover:shadow-md transition-all flex items-center gap-2 shrink-0">
              <Icon name="add" className="text-xl" /> 새 보고 등록
            </button>
          </div>
          
          <div className="space-y-8 pt-2">
            
            <div className="animate-[fadeIn_0.3s_ease-out]">
              <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <Icon name="article" className="text-blue-500 text-xl" /> 나의 최근 보고서
                <span className="bg-blue-100 text-blue-700 text-xs px-2.5 py-0.5 rounded-full font-bold">{myReports.length}</span>
              </h2>
              
              {myReports.length > 0 ? (
                <div className="grid grid-cols-1 gap-3">
                  {myReports.slice(0, displayLimits.my).map(renderReportCard)}
                  
                  {myReports.length > displayLimits.my && (
                    <button onClick={() => loadMore('my')} className="w-full py-3 mt-1 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-sm font-bold rounded-xl flex items-center justify-center gap-1 transition-colors">
                      더 보기 ({myReports.length - displayLimits.my}건 남음) <Icon name="expand_more" className="text-[18px]" />
                    </button>
                  )}
                </div>
              ) : (
                <div className="text-center py-8 text-slate-400 text-sm border border-dashed border-slate-200 rounded-xl bg-white">최근 90일 내 제출한 보고서가 없습니다.</div>
              )}
            </div>

            {sharedReports.length > 0 && (
              <div className="animate-[fadeIn_0.4s_ease-out] border-t border-slate-200 pt-8">
                <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <Icon name="share" className="text-purple-500 text-xl" /> 공유 및 참조된 보고서
                  <span className="bg-purple-100 text-purple-700 text-xs px-2.5 py-0.5 rounded-full font-bold">{sharedReports.length}</span>
                </h2>
                
                <div className="grid grid-cols-1 gap-3">
                  {sharedReports.slice(0, displayLimits.shared).map(renderReportCard)}
                  
                  {sharedReports.length > displayLimits.shared && (
                    <button onClick={() => loadMore('shared')} className="w-full py-3 mt-1 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 text-sm font-bold rounded-xl flex items-center justify-center gap-1 transition-colors">
                      더 보기 ({sharedReports.length - displayLimits.shared}건 남음) <Icon name="expand_more" className="text-[18px]" />
                    </button>
                  )}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    };
     
    // =========================================================================
    // 🚨 [통합 대시보드 뷰 - 등록자 정보 표시 + 수정/삭제 권한 완벽 적용본] 
    // =========================================================================
    const IntegratedDashboard = ({ userData, dashboards, refreshDashboards }) => {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isDeleting, setIsDeleting] = useState(false); 
      // 🚨 [수정 모드 상태 추가] 수정할 대시보드 ID를 저장 (null이면 '새로 등록' 모드)
      const [editId, setEditId] = useState(null); 
      const [form, setForm] = useState({ type: '내부', source: userData.team, title: '', desc: '', url: '' });
      const [favIds, setFavIds] = useState([]);

      const toggleFavorite = (e, id) => { 
        e.stopPropagation(); 
        setFavIds(prev => prev.includes(id) ? prev.filter(f => f !== id) : [...prev, id]);
      };

      const getTeamColor = (teamName) => {
        if (!teamName) return 'from-gray-400 to-gray-500';
        if (teamName.includes('인사전략')) return 'from-blue-500 to-indigo-600';
        if (teamName.includes('인재개발')) return 'from-emerald-400 to-teal-500';
        if (teamName.includes('GHR')) return 'from-amber-400 to-orange-500';
        if (teamName.includes('인사')) return 'from-purple-500 to-pink-600';
        if (teamName.includes('총무')) return 'from-sky-500 to-blue-600'; 
        if (teamName.includes('재무') || teamName.includes('회계')) return 'from-cyan-500 to-blue-500';
        return 'from-indigo-400 to-purple-500'; 
      };

      const handleFormChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

      // 🚨 새 대시보드 등록 모달 열기
      const openCreateModal = () => {
        setEditId(null);
        setForm({ type: '내부', source: userData.team, title: '', desc: '', url: '' });
        setIsModalOpen(true);
      };

      // 🚨 기존 대시보드 수정 모달 열기
      const openEditModal = (e, db) => {
        e.stopPropagation(); // 카드 클릭 방지
        setEditId(db.id);
        setForm({ type: db.type, source: db.team, title: db.title, desc: db.desc, url: db.url });
        setIsModalOpen(true);
      };

      // 🚨 폼 제출 (등록 & 수정 동시 처리)
      const handleSubmit = () => {
        if (!form.title || !form.url || (form.type === '외부' && !form.source)) {
          Swal.fire({ icon: 'warning', title: '입력 오류', text: '필수 항목을 모두 채워주세요.', confirmButtonColor: '#4F46E5' });
          return;
        }

        setIsSubmitting(true);
        
        if (editId) {
          // [수정 모드]
          const payload = { id: editId, type: form.type, source: form.type === '내부' ? userData.team : form.source, title: form.title, desc: form.desc, url: form.url };
          google.script.run
            .withSuccessHandler(() => {
              setIsSubmitting(false); setIsModalOpen(false);
              Swal.fire({ icon: 'success', title: '수정 완료!', text: '대시보드 정보가 업데이트되었습니다.', confirmButtonColor: '#4F46E5' });
              refreshDashboards(); 
            })
            .withFailureHandler((err) => { setIsSubmitting(false); Swal.fire({ icon: 'error', title: '오류', text: err.message, confirmButtonColor: '#EF4444' }); })
            .updateDashboard(payload); // 신규 추가한 업데이트 함수 호출
        } else {
          // [새로 등록 모드]
          const payload = { email: userData.email, type: form.type, source: form.type === '내부' ? userData.team : form.source, title: form.title, desc: form.desc, url: form.url };
          google.script.run
            .withSuccessHandler(() => {
              setIsSubmitting(false); setIsModalOpen(false);
              Swal.fire({ icon: 'success', title: '등록 완료!', text: '새 대시보드가 추가되었습니다.', confirmButtonColor: '#4F46E5' });
              refreshDashboards(); 
            })
            .withFailureHandler((err) => { setIsSubmitting(false); Swal.fire({ icon: 'error', title: '오류', text: err.message, confirmButtonColor: '#EF4444' }); })
            .submitDashboard(payload);
        }
      };

      const handleDelete = (e, id) => {
        e.stopPropagation(); 
        Swal.fire({
          title: '정말 삭제하시겠습니까?', text: "삭제한 대시보드는 복구할 수 없습니다.", icon: 'warning',
          showCancelButton: true, confirmButtonColor: '#EF4444', cancelButtonColor: '#cbd5e1', confirmButtonText: '삭제', cancelButtonText: '취소'
        }).then((result) => {
          if (result.isConfirmed) {
            setIsDeleting(true); Swal.showLoading();
            google.script.run
              .withSuccessHandler(() => {
                setIsDeleting(false);
                Swal.fire({ icon: 'success', title: '삭제 완료', text: '대시보드가 삭제되었습니다.', confirmButtonColor: '#4F46E5' });
                refreshDashboards(); 
              })
              .withFailureHandler((err) => { setIsDeleting(false); Swal.fire({ icon: 'error', title: '오류 발생', text: err.message, confirmButtonColor: '#EF4444' }); })
              .deleteDashboard(id); 
          }
        });
      };

      const favDashboards = dashboards.filter(d => favIds.includes(d.id));
      const internalDashboards = dashboards.filter(d => d.type === '내부');
      const externalDashboards = dashboards.filter(d => d.type === '외부');

      const renderCard = (db) => {
        const isFav = favIds.includes(db.id);
        const colorClass = db.type === '외부' ? 'from-slate-700 to-slate-900' : getTeamColor(db.team);
        
        // 🚨 권한 제어: 대시보드 최초 등록자(이메일 일치)에게만 수정 및 삭제 권한 부여
        const hasManageAuth = db.email === userData.email;
        
        return (
          <div key={db.id} onClick={() => window.open(db.url, '_blank')} className="bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-lg hover:border-indigo-300 transition-all cursor-pointer group flex flex-col h-full">
            <div className={`bg-gradient-to-r ${colorClass} px-5 py-3.5 relative flex items-center justify-between`}>
              <div className="bg-white/20 backdrop-blur-sm px-3 py-1 rounded-md"><span className="text-[13px] font-bold text-white tracking-wide">{db.team}</span></div>
              
              <div className="flex items-center gap-1">
                <button onClick={(e) => toggleFavorite(e, db.id)} className="text-white hover:scale-110 p-1 transition-transform" title="즐겨찾기">
                  <Icon name="star" filled={isFav} className={isFav ? "text-amber-300" : "text-white/70"} />
                </button>
                
                {/* 🚨 수정/삭제 버튼 컨테이너 (권한이 있을 때만 렌더링) */}
                {hasManageAuth && (
                  <div className="flex items-center border-l border-white/20 pl-1 ml-1">
                    <button onClick={(e) => openEditModal(e, db)} className="text-white/70 hover:text-white hover:scale-110 p-1 transition-all" title="정보 수정">
                      <Icon name="edit" className="text-[18px]" />
                    </button>
                    <button onClick={(e) => handleDelete(e, db.id)} className="text-white/70 hover:text-red-200 hover:scale-110 p-1 transition-all" title="삭제하기">
                      <Icon name="delete" className="text-[18px]" />
                    </button>
                  </div>
                )}
              </div>
            </div>
            
            <div className="p-5 pt-6 flex-1 flex flex-col">
              <h3 className="text-lg font-bold text-slate-800 mb-1 group-hover:text-indigo-600 line-clamp-1">{db.title}</h3>
              <p className="text-sm text-slate-500 mb-4 line-clamp-2">{db.desc}</p>
              
              {/* 🚨 동적 매핑된 등록자 정보 표시 */}
              <div className="mt-auto pt-4 border-t border-slate-100 flex items-center justify-between">
                <div className="flex items-center gap-1.5 text-[11px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-md">
                  <Icon name="account_circle" className="text-[14px]" /> 등록: {db.creatorName}
                </div>
                <div className="text-sm font-bold text-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity flex items-center">
                  <span>열람하기</span><Icon name="open_in_new" className="text-[16px]" />
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="space-y-8 animate-[fadeIn_0.2s_ease-out]">
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
              <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icon name="bar_chart" className="text-indigo-500 text-3xl" /> 통합 대시보드</h1>
              <p className="text-slate-500 mt-1 text-sm">각 부서에서 운영 중인 핵심 대시보드를 한곳에서 조회하고 관리하세요.</p>
            </div>
            <button onClick={openCreateModal} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition-colors flex items-center gap-2 shadow-sm shrink-0">
              <Icon name="add" className="text-[18px]" /> 새 대시보드 등록
            </button>
          </div>

          {favDashboards.length > 0 && (
            <div>
              <div className="inline-flex items-center gap-2 bg-amber-50 px-4 py-2 rounded-xl border border-amber-200 mb-4 shadow-sm">
                <Icon name="star" filled={true} className="text-amber-500 text-xl" /> 
                <h2 className="text-sm font-bold text-amber-800">즐겨찾는 대시보드</h2>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">{favDashboards.map(renderCard)}</div>
            </div>
          )}

          <div>
            <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="domain" className="text-slate-500 text-xl" /> 우리 부서 대시보드</h2>
            {internalDashboards.length === 0 ? (
               <div className="text-center py-10 bg-white border border-dashed border-slate-200 rounded-2xl text-slate-400 text-sm">소속 부서에 등록된 대시보드가 없습니다.</div>
            ) : (
               <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">{internalDashboards.map(renderCard)}</div>
            )}
          </div>

          {externalDashboards.length > 0 && (
            <div>
              <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="link" className="text-indigo-500 text-xl" /> 타 부서 및 외부 연동 대시보드</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">{externalDashboards.map(renderCard)}</div>
            </div>
          )}

          {isModalOpen && (
             <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl flex flex-col animate-[fadeIn_0.2s_ease-out]">
                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                  {/* 🚨 모달 타이틀 동적 변경 */}
                  <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <Icon name={editId ? "edit_note" : "bar_chart"} className="text-indigo-600"/> 
                    {editId ? '대시보드 정보 수정' : '새 대시보드 등록'}
                  </h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:bg-slate-200 p-1 rounded-full"><Icon name="close" /></button>
                </div>
                <div className="p-6 space-y-5">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">대시보드 노출 구분 <span className="text-red-500">*</span></label>
                    <div className="flex bg-slate-100 p-1 rounded-xl w-full h-[46px]">
                      <button onClick={() => setForm({...form, type: '내부', source: userData.team})} className={`flex-1 text-sm font-bold rounded-lg transition-all ${form.type === '내부' ? 'bg-white shadow-sm text-indigo-600 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`}>🏢 우리 부서용</button>
                      <button onClick={() => setForm({...form, type: '외부', source: ''})} className={`flex-1 text-sm font-bold rounded-lg transition-all ${form.type === '외부' ? 'bg-white shadow-sm text-indigo-600 border border-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`}>🔗 외부 연동용</button>
                    </div>
                  </div>
                  {form.type === '외부' && (
                    <div>
                      <label className="block text-sm font-bold text-slate-700 mb-2">출처 / 관리부서 (수기입력) <span className="text-red-500">*</span></label>
                      <input type="text" name="source" value={form.source} onChange={handleFormChange} placeholder="예: 전사공통, 재무본부" className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-1 focus:ring-indigo-500 bg-slate-50 focus:bg-white" />
                    </div>
                  )}
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">대시보드 명 <span className="text-red-500">*</span></label>
                    <input type="text" name="title" value={form.title} onChange={handleFormChange} placeholder="예: 전사 인건비 현황 보드" className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-1 focus:ring-indigo-500 bg-slate-50 focus:bg-white" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">간략 설명</label>
                    <input type="text" name="desc" value={form.desc} onChange={handleFormChange} placeholder="대시보드의 목적이나 주요 지표를 적어주세요" className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-1 focus:ring-indigo-500 bg-slate-50 focus:bg-white" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">링크 URL <span className="text-red-500">*</span></label>
                    <input type="url" name="url" value={form.url} onChange={handleFormChange} placeholder="https://lookerstudio.google.com/..." className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-1 focus:ring-indigo-500 bg-slate-50 focus:bg-white" />
                  </div>
                </div>
                <div className="p-6 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 rounded-b-2xl">
                  <button onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 bg-white border border-slate-300 text-slate-600 rounded-xl font-bold hover:bg-slate-100">취소</button>
                  <button onClick={handleSubmit} disabled={isSubmitting} className="px-6 py-2.5 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-sm flex items-center gap-2">
                    {isSubmitting ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <Icon name={editId ? "edit" : "save"} className="text-[18px]" />} 
                    {editId ? '수정 완료' : '저장하기'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };
    
    // =========================================================================
    // 🚨 [컴포넌트] 보고서 보관함 뷰 V.1.1 (실/팀 필터 및 열 분리 + 최신순 정렬)
    // =========================================================================
    const ReportArchiveView = ({ reports, onNavigateToDetail }) => {
      const [searchTerm, setSearchTerm] = useState('');
      
      // 🚨 [수정 1] 기존 filterDept를 실(Office)과 팀(Team)으로 분리
      const [filterOffice, setFilterOffice] = useState('전체 실');
      const [filterTeam, setFilterTeam] = useState('전체 팀');
      const [filterStatus, setFilterStatus] = useState('상태: 전체');
      
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 7; // 한 페이지에 7개씩 노출 (이 개수를 넘어야 하단에 페이지네이션이 나타납니다)

      // 1. 방어적 코드
      const safeReports = Array.isArray(reports) ? reports : [];

      // 🚨 [수정 2] 부서(실) 및 팀 목록 동적 추출 (필터 드롭다운 용도)
      const uniqueOffices = ['전체 실', ...new Set(safeReports.map(r => r.dept).filter(Boolean))];
      // 선택된 '실'에 종속된 '팀' 목록만 추출
      const availableTeams = ['전체 팀', ...new Set(
        safeReports
          .filter(r => filterOffice === '전체 실' || r.dept === filterOffice)
          .map(r => r.team)
          .filter(Boolean)
      )];

      // 3. 복합 필터링 적용 (검색어 + 실 + 팀 + 상태)
      const filteredReports = safeReports.filter(report => {
        const matchSearch = searchTerm === '' || 
          (report.title || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (report.aiSummary || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
          (report.author || '').toLowerCase().includes(searchTerm.toLowerCase());

        // 🚨 분리된 필터 조건 검사
        const matchOffice = filterOffice === '전체 실' || report.dept === filterOffice;
        const matchTeam = filterTeam === '전체 팀' || report.team === filterTeam;

        let matchStatus = true;
        if (filterStatus === '진행 중') {
          matchStatus = report.status && (report.status.includes('대기') || report.status.includes('반려'));
        } else if (filterStatus === '완료') {
          matchStatus = report.status && report.status.includes('승인');
        }

        return matchSearch && matchOffice && matchTeam && matchStatus;
      });

      // 🚨 [수정 3] 필터링된 결과물을 '보고일자(reportDate)' 기준 내림차순(최신순) 정렬 추가!
      filteredReports.sort((a, b) => new Date(b.reportDate || 0) - new Date(a.reportDate || 0));

      // 4. 페이지네이션 계산 (정렬된 filteredReports를 기반으로 자름)
      const totalPages = Math.max(1, Math.ceil(filteredReports.length / itemsPerPage));
      const startIndex = (currentPage - 1) * itemsPerPage;
      const currentReports = filteredReports.slice(startIndex, startIndex + itemsPerPage);

      const handlePageChange = (newPage) => {
        if (newPage >= 1 && newPage <= totalPages) {
          setCurrentPage(newPage);
        }
      };

      useEffect(() => {
        setCurrentPage(1);
      }, [searchTerm, filterOffice, filterTeam, filterStatus]); // 필터 조건 추가

      return (
        <div className="space-y-6 max-w-5xl mx-auto pb-10 animate-[fadeIn_0.2s_ease-out]">
          
          {/* 헤더 영역 (구글 시트 내보내기 버튼 삭제) */}
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
              <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                <Icon name="folder_open" className="text-blue-600" /> 보고서 보관함
              </h1>
              <p className="text-slate-500 mt-1 text-sm">과거부터 현재까지의 모든 보고서를 검색하고 조회할 수 있는 통합 아카이브입니다.</p>
            </div>
          </div>

          {/* AI 시맨틱 통합 검색 배너 */}
          <div className="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl p-6 text-white shadow-md relative overflow-hidden">
            <div className="absolute -right-4 -top-4 opacity-10 pointer-events-none">
              <Icon name="auto_awesome" className="text-[140px]" />
            </div>
            <div className="relative z-10 flex flex-col md:flex-row gap-4 items-center">
              <div className="flex-1">
                <h3 className="text-lg font-bold flex items-center gap-2 mb-2">
                  <Icon name="auto_awesome" className="text-indigo-200 text-xl" /> 통합 검색
                </h3>
                <p className="text-indigo-100 text-sm">
                  제목, 본문 내용까지 자연스럽게 검색해보세요.
                </p>
              </div>
              <div className="w-full md:w-1/2 relative">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <Icon name="search" className="text-slate-400 text-lg" />
                </div>
                <input 
                  type="text" 
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full pl-10 pr-4 py-3 border border-white/20 rounded-xl focus:ring-2 focus:ring-white bg-white/10 text-white placeholder-indigo-200 backdrop-blur-sm transition-all outline-none" 
                  placeholder="어떤 문서를 찾으시나요?" 
                />
              </div>
            </div>
          </div>

          {/* 복합 필터 바 */}
          <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-wrap gap-3 items-center">
            <div className="flex items-center gap-1.5 text-slate-500 font-medium mr-1 text-sm">
              <Icon name="filter_alt" className="text-[18px]" /> 필터:
            </div>
            
            {/* 🚨 실(Office) 필터 드롭다운 */}
            <select 
              value={filterOffice} 
              onChange={(e) => {
                setFilterOffice(e.target.value);
                setFilterTeam('전체 팀'); // 실 변경 시 팀 필터 자동 초기화
              }}
              className="bg-slate-50 border border-slate-200 text-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer"
            >
              {uniqueOffices.map(office => <option key={office} value={office}>{office}</option>)}
            </select>

            {/* 🚨 팀(Team) 필터 드롭다운 */}
            <select 
              value={filterTeam} 
              onChange={(e) => setFilterTeam(e.target.value)}
              className="bg-slate-50 border border-slate-200 text-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer"
            >
              {availableTeams.map(team => <option key={team} value={team}>{team}</option>)}
            </select>

            <select 
              value={filterStatus} 
              onChange={(e) => setFilterStatus(e.target.value)}
              className="bg-slate-50 border border-slate-200 text-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer"
            >
              <option>상태: 전체</option>
              <option>진행 중</option>
              <option>완료</option>
            </select>
            
            <div className="ml-auto text-sm text-slate-500 font-medium">
              총 <span className="text-blue-600 font-bold">{filteredReports.length}</span>건
            </div>
          </div>

          {/* 보고서 데이터 테이블 */}
          <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse min-w-[800px]">
                <thead>
                  <tr className="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm">
                    <th className="p-4 font-semibold w-[120px]">상태</th>
                    {/* 🚨 [수정 4] 실과 팀 열을 분리 */}
                    <th className="p-4 font-semibold w-[100px]">실</th>
                    <th className="p-4 font-semibold w-[120px]">팀</th>
                    <th className="p-4 font-semibold">보고 제목 (AI 요약)</th>
                    <th className="p-4 font-semibold w-[100px]">보고자</th>
                    <th className="p-4 font-semibold w-[120px]">보고 일자</th>
                  </tr>
                </thead>
                <tbody>
                  {currentReports.length > 0 ? (
                    currentReports.map((report) => {
                      const isCompleted = report.status.includes('승인');
                      const statusLabel = isCompleted ? '완료' : report.status;
                      const statusColorClass = isCompleted ? 'border-slate-200 text-slate-500 bg-slate-50' : report.statusColor;

                      return (
                        <tr 
                          key={report.id} 
                          onClick={() => onNavigateToDetail(report)}
                          className="border-b border-slate-100 hover:bg-blue-50/50 cursor-pointer transition-colors group"
                        >
                          {/* 🚨 레이아웃 붕괴 방지를 위해 모든 열에 align-top (상단 정렬) 적용 */}
                          <td className="p-4 align-top pt-5">
                            <span className={`text-[11px] font-bold px-2 py-1 rounded-md border ${statusColorClass} whitespace-nowrap`}>
                              {statusLabel}
                            </span>
                          </td>
                          {/* 🚨 실, 팀 각각 렌더링 */}
                          <td className="p-4 text-sm text-slate-600 font-medium whitespace-nowrap align-top pt-5">{report.dept}</td>
                          <td className="p-4 text-sm text-slate-600 whitespace-nowrap align-top pt-5">{report.team}</td>
                          <td className="p-4 align-top">
                            <p className="font-bold text-slate-800 group-hover:text-blue-600 transition-colors mb-1.5 line-clamp-1">
                              {report.title}
                            </p>
                            {/* 🚨 AI 요약 2줄 제한 (line-clamp-2) 완벽 적용 */}
                            <div className="text-xs text-slate-500 line-clamp-2 leading-relaxed">
                              <Icon name="auto_awesome" className="text-[12px] text-indigo-400 inline-block mr-1 align-text-bottom" />
                              {report.aiSummary || "요약 내용 없음"}
                            </div>
                          </td>
                          <td className="p-4 text-sm text-slate-600 whitespace-nowrap align-top pt-5">{report.author}</td>
                          <td className="p-4 text-sm text-slate-500 font-medium whitespace-nowrap align-top pt-5">
                            {report.reportDate || "날짜 없음"}
                          </td>
                        </tr>
                      );
                    })
                  ) : (
                    <tr>
                      <td colSpan="6" className="p-10 text-center text-slate-400 text-sm"> {/* 🚨 컬럼 추가로 인해 colSpan 5->6으로 변경 */}
                        조건에 맞는 보고서가 없습니다. 검색어나 필터를 변경해 보세요.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
            
            {/* 🚨 오류 수정된 페이지네이션 영역 (데이터가 7개를 초과할 때 나타납니다) */}
            {totalPages > 1 && (
              <div className="p-4 border-t border-slate-100 flex items-center justify-center gap-2 bg-white">
                <button 
                  onClick={() => handlePageChange(currentPage - 1)}
                  disabled={currentPage === 1}
                  className="px-3 py-1.5 text-sm text-slate-500 hover:bg-slate-100 rounded-md disabled:opacity-30 disabled:hover:bg-transparent transition-colors font-medium"
                >
                  이전
                </button>
                
                <div className="flex gap-1">
                  {Array.from({ length: totalPages }, (_, i) => i + 1).map(num => (
                    <button
                      key={num}
                      onClick={() => handlePageChange(num)}
                      className={`w-8 h-8 flex items-center justify-center text-sm rounded-md transition-colors ${
                        currentPage === num 
                          ? 'bg-blue-600 text-white font-bold shadow-sm' 
                          : 'text-slate-600 hover:bg-slate-100 font-medium'
                      }`}
                    >
                      {num}
                    </button>
                  ))}
                </div>

                <button 
                  onClick={() => handlePageChange(currentPage + 1)}
                  disabled={currentPage === totalPages}
                  className="px-3 py-1.5 text-sm text-slate-500 hover:bg-slate-100 rounded-md disabled:opacity-30 disabled:hover:bg-transparent transition-colors font-medium"
                >
                  다음
                </button>
              </div>
            )}
          </div>
          
        </div>
      );
    }

    // =========================================================================
    // [메인 앱] App 컴포넌트 🚨 (읽음 처리 로직 추가)
    // =========================================================================
    function App() {
      const [isLoadingInit, setIsLoadingInit] = useState(true);
      const [userData, setUserData] = useState(null);
      const [orgData, setOrgData] = useState(null);
      const [userList, setUserList] = useState([]);
      
      const [myReports, setMyReports] = useState([]);
      const [myDashboards, setMyDashboards] = useState([]);
      
      const [viewMode, setViewMode] = useState('employee'); 
      const [activeMenu, setActiveMenu] = useState('dashboard');
      const [selectedReport, setSelectedReport] = useState(null);

      // 🚨 [추가됨] 피드백 모달을 위한 상태(State) 선언 모음
      const [isFeedbackModalOpen, setIsFeedbackModalOpen] = useState(false);
      const [feedbackType, setFeedbackType] = useState('🐛 버그/오류 신고'); // 기본값
      const [feedbackTitle, setFeedbackTitle] = useState('');
      const [feedbackContent, setFeedbackContent] = useState('');
      const [isFeedbackSubmitting, setIsFeedbackSubmitting] = useState(false);

      const handleGoBack = (shouldRefresh) => {
        setSelectedReport(null); 
        if (shouldRefresh) { 
          google.script.run.withSuccessHandler(setMyReports).getMySubmissions();
        }
      };

      const fetchDashboards = () => {
        google.script.run.withSuccessHandler(setMyDashboards).getDashboards();
      };

      // 🚨 보고서 클릭 시 상세 화면을 열고, 안 읽은 문서면 읽음 처리(DB 통신)
      const handleReportClick = (report) => {
        setSelectedReport(report);
        if (!report.isRead) {
          // 화면에서 즉시 읽음(빨간 점 제거) 처리
          const updatedReports = myReports.map(r => r.id === report.id ? { ...r, isRead: true } : r);
          setMyReports(updatedReports);
          // 백엔드 시트에 읽음 기록
          google.script.run.markReportAsRead(report.id);
        }
      };

      // 🚨 [추가됨] 피드백 제출 함수
      const handleFeedbackSubmit = () => {
        // 1. 유효성 검사 (제목, 내용 비어있는지 확인)
        if (!feedbackTitle.trim() || !feedbackContent.trim()) {
          Swal.fire('알림', '제목과 상세 내용을 모두 입력해주세요.', 'warning');
          return;
        }

        setIsFeedbackSubmitting(true);

        // 2. 백엔드로 보낼 데이터 꾸리기
        const payload = {
          userName: userData.name,
          userEmail: userData.email,
          type: feedbackType,
          title: feedbackTitle,
          content: feedbackContent
        };

        // 3. 백엔드 통신
        google.script.run
          .withSuccessHandler((res) => {
            setIsFeedbackSubmitting(false);
            if (res.success) {
              Swal.fire('접수 완료!', '소중한 의견 감사합니다. 더 나은 시스템으로 보답하겠습니다.', 'success');
              // 성공 시 폼 초기화 및 모달 닫기
              setIsFeedbackModalOpen(false);
              setFeedbackTitle('');
              setFeedbackContent('');
              setFeedbackType('🐛 버그/오류 신고');
            } else {
              Swal.fire('오류', res.message, 'error');
            }
          })
          .withFailureHandler((err) => {
            setIsFeedbackSubmitting(false);
            Swal.fire('통신 오류', err.message, 'error');
          })
          .submitFeedback(payload); // 🚨 Code.gs에 추가했던 백엔드 함수 호출
      };

      useEffect(() => {
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler((data) => {
              const myInfo = data.userList.find(u => u.email === data.email);
              
              setUserData({ 
                email: data.email, 
                name: myInfo ? myInfo.name : data.email.split('@')[0], 
                isLeader: data.isLeader,
                // 🚨 백엔드에서 분리해서 보낸 정보를 그대로 맵핑
                office: myInfo ? myInfo.office : '소속 미지정',
                team: myInfo ? myInfo.team : '',
                role: myInfo ? myInfo.role : '팀원'
              });

              setOrgData(data.orgMap);
              setUserList(data.userList);
              setViewMode(data.isLeader ? 'executive' : 'employee');
              setIsLoadingInit(false);

              google.script.run.withSuccessHandler((reports) => {
                setMyReports(reports);
              }).getMySubmissions();

              fetchDashboards();

            }).getFormData();
        } else {
          setIsLoadingInit(false);
          setUserData({ email: 'test@coway.com', name: '정해인', isLeader: true, team: '테스트팀', office: '테스트실', role: '팀장' });
        }
      }, []);

      if (isLoadingInit) {
        return (
          <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-50">
            <div className="loader mb-4"></div>
            <p className="font-bold text-slate-500">포털 시스템 접속 중...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 flex font-sans">
          <aside className="w-64 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
            <div className="p-6 border-b border-slate-100">
              <div className="flex items-center gap-2 text-xl font-black text-slate-800 tracking-tight">
                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><Icon name="auto_awesome" className="text-white text-lg" /></div>
                Work<span className="text-blue-600">Flow</span>
              </div>
            </div>
            <nav className="flex-1 p-4 space-y-1">
              <button onClick={() => { setActiveMenu('dashboard'); setSelectedReport(null); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-colors ${activeMenu === 'dashboard' ? 'bg-blue-50 text-blue-600' : 'text-slate-600 hover:bg-slate-50'}`}>
                <Icon name="dashboard" className="text-xl" /> 보고 현황
              </button>
              <button onClick={() => { setActiveMenu('integrated'); setSelectedReport(null); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-colors ${activeMenu === 'integrated' ? 'bg-blue-50 text-blue-600' : 'text-slate-600 hover:bg-slate-50'}`}>
                <Icon name="bar_chart" className="text-xl" /> 통합 대시보드
              </button>
              <button onClick={() => { setActiveMenu('reports'); setSelectedReport(null); }} className={`w-full flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl font-medium hover:bg-slate-50 transition-colors ${activeMenu === 'reports' ? 'bg-blue-50 text-blue-600' : ''}`}>
                <Icon name="folder" className="text-xl" /> 보고서 보관함
              </button>
            </nav>
            <div className="p-4 border-t border-slate-100">
              <button onClick={() => setIsFeedbackModalOpen(true)} // 🚨 클릭 시 모달 열기
              className="flex items-center gap-3 w-full px-4 py-3 text-slate-600 rounded-xl hover:bg-indigo-50 hover:text-indigo-700 transition-colors group font-bold">
              <Icon name="lightbulb" className="text-xl text-amber-500 group-hover:scale-110 transition-transform" /> 피드백 및 개선 제안
              </button>
            </div>  
          </aside>

          <main className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="bg-white h-16 border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
              <div className="font-semibold text-slate-500">경영지원본부 스마트 보고 시스템</div>
              <div className="flex items-center gap-4 ml-auto">
                <div className="flex items-center gap-3 bg-slate-50 py-1.5 px-3 rounded-lg border border-slate-200 cursor-pointer hover:bg-slate-100 transition-colors">
                  <div className="w-8 h-8 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-bold text-sm">
                    <Icon name="person" className="text-[18px]" />
                  </div>
                  <div className="flex flex-col justify-center pr-1">
                    <span className="text-[10px] font-bold text-slate-400 leading-none mb-1">
                      {userData.office} {userData.team}
                    </span>
                    <span className="text-sm font-bold text-slate-700 leading-none">
                      {userData.name} 님
                    </span>
                  </div>
                </div>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-6 md:p-8">
              <div className="max-w-5xl mx-auto">
                {selectedReport ? (
                  <ReportDetailView report={selectedReport} setReport={setSelectedReport} goBack={handleGoBack} userData={userData} userList={userList} reports={myReports} />
                ) : activeMenu === 'newReport' ? (
                  <NewReportForm setActiveMenu={setActiveMenu} userData={userData} orgData={orgData} userList={userList} reports={myReports} />
                ) : activeMenu === 'integrated' ? (
                  <IntegratedDashboard userData={userData} dashboards={myDashboards} refreshDashboards={fetchDashboards} />
                ) : activeMenu === 'dashboard' ? (
                  <>
                    <div className="mb-8">
                      <h1 className="text-2xl font-bold text-slate-800">
                        안녕하세요, {userData.name} 님.
                      </h1>
                      <p className="text-slate-500 mt-1">오늘도 성공적인 업무를 응원합니다.</p>
                    </div>
                    {/* 🚨 Dashboard에 렌더링 시 handleReportClick 연결 */}
                    {viewMode === 'executive' ? (
                      <ExecutiveDashboard setActiveMenu={setActiveMenu} reports={myReports} userData={userData} handleReportClick={handleReportClick} />
                    ) : (
                      <EmployeeDashboard setActiveMenu={setActiveMenu} reports={myReports} handleReportClick={handleReportClick} userData={userData} />
                    )}
                  </>
                ) : activeMenu === 'reports' ? (
                  // 🚨 여기에 방금 만든 ReportArchiveView 컴포넌트를 연결합니다!
                  <ReportArchiveView reports={myReports} onNavigateToDetail={handleReportClick} />
                ) : null}
            
              </div>
            </div>
          </main>
          {/* 🚨 피드백 모달을 화면 최상단(root div 안쪽 끝)에 배치합니다! */}
          {isFeedbackModalOpen && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl flex flex-col animate-[fadeIn_0.2s_ease-out]">
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-2xl">
                  <div>
                    <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2"><Icon name="campaign" className="text-amber-500"/> 시스템 피드백 보내기</h3>
                    <p className="text-[11px] text-slate-500 mt-0.5">여러분의 소중한 의견이 더 나은 시스템을 만듭니다!</p>
                  </div>
                  <button onClick={() => setIsFeedbackModalOpen(false)} className="text-gray-400 hover:text-gray-600 bg-white rounded-full p-1 shadow-sm"><Icon name="close" /></button>
                </div>
                
                <div className="p-6 space-y-5">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">어떤 의견이신가요?</label>
                    <div className="grid grid-cols-2 gap-2">
                      {['🐛 버그/오류 신고', '✨ 기능 제안', '🎨 UI/UX 개선', '💬 기타 의견'].map(type => (
                        <button 
                          key={type} onClick={() => setFeedbackType(type)}
                          className={`px-3 py-2 text-sm font-bold rounded-lg border transition-colors ${feedbackType === type ? 'bg-indigo-50 border-indigo-300 text-indigo-700' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}
                        >
                          {type}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">제목</label>
                    <input type="text" value={feedbackTitle} onChange={e => setFeedbackTitle(e.target.value)} placeholder="의견을 한 줄로 요약해주세요" className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">상세 내용</label>
                    <textarea value={feedbackContent} onChange={e => setFeedbackContent(e.target.value)} placeholder="개선이 필요한 부분이나 좋은 아이디어를 자유롭게 남겨주세요!" className="w-full h-32 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
                  </div>
                </div>
                
                <div className="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-2 rounded-b-2xl">
                  <button onClick={() => setIsFeedbackModalOpen(false)} className="px-5 py-2 bg-white border border-gray-300 text-gray-600 font-bold rounded-xl hover:bg-gray-100 text-sm">취소</button>
                  <button onClick={handleFeedbackSubmit} disabled={isFeedbackSubmitting} className="px-5 py-2 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 text-sm flex items-center gap-1">
                    {isFeedbackSubmitting ? '전송 중...' : <><Icon name="send" className="text-[16px]"/> 피드백 제출</>}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
