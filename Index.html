  for (const [officeName, teams] of Object.entries(orgData)) {
    if (teams.includes(myInfo.team)) { myOffice = officeName; myTeam = myInfo.team; break; }

  const toggleUser = (user) => {

      setSelectedSharedUsers(selectedSharedUsers.filter(s => !teamUsers.some(u => u.email === s.email)));
    } else {
      const newUsers = teamUsers.filter(u => !selectedSharedUsers.some(s => s.email === u.email));

        reportDate: formData.reportDate, title: formData.title, url: attachType === 'url' ? formData.url : "",
        fileData: fileBase64, fileName: selectedFile ? selectedFile.name : "", fileContentType: selectedFile ? selectedFile.type : "",
        sharedUsers: selectedSharedUsers.map(u => u.email).join(', '),
        targetRole: targetRole,
        isArchiveMode: isArchiveMode,
        reportType: reportType, 
        linkedReports: linkedReports.map(r => r.id).join(','), // 🚨 [추가] 선택된 연관 보고서 ID 문자열 전송
        htmlSource: attachType === 'url' ? htmlSource : "" // 🚨 [신규 추가] URL 링크 타입일 때 수집한 HTML 날것 데이터를 백엔드로 토스합니다.
      };

        })
        .submitReport(payload);

    if (attachType === 'file' && selectedFile) {

      reader.onload = (e) => sendData(e.target.result);
      reader.readAsDataURL(selectedFile);
    } else {
      sendData();

  };

                    u.email.toLowerCase().includes(kw);
      if (!match) return;

    else t = '소속 미지정';
    if (!groupedUsers[t]) groupedUsers[t] = [];
    groupedUsers[t].push(u);
  });

            <p className="text-slate-500 mt-2 text-sm">제출된 문서는 소속 본부장/실장/팀장에게 기본적으로 노출되며, Vertex AI가 핵심 내용을 자동 요약합니다.</p>
          </div>
          
          <div className="bg-white px-4 py-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3 shrink-0 cursor-pointer" onClick={() => setIsArchiveMode(!isArchiveMode)}>
            <div className="flex flex-col items-end">
              <span className="text-sm font-bold text-slate-700">기존 보고서 등록</span>

            </div>
            <label className="relative inline-flex items-center cursor-pointer pointer-events-none">
              <input type="checkbox" checked={isArchiveMode} readOnly className="sr-only peer" />
              <div className="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
            </label>
          </div>

              <Icon name="info" className="text-emerald-500 mt-0.5" />

                         `&response_type=token` +
                         `&scope=${encodeURIComponent(SCOPES)}` +
                         `&state=tasks_handshake`;
                         
        const popupWindow = window.open(oauthUrl, 'GoogleAuthPopup', 'width=500,height=600,top=100,left=100');

        const pollTimer = setInterval(() => {
          const savedToken = localStorage.getItem('GOOGLE_TASKS_TOKEN');
          if (savedToken) {
            clearInterval(pollTimer);
            localStorage.removeItem('GOOGLE_TASKS_TOKEN');
            setGoogleAccessToken(savedToken);
            executeTaskInsertion(savedToken);
            if (popupWindow) popupWindow.close();
          }
          if (popupWindow && popupWindow.closed) clearInterval(pollTimer);
        }, 500);
      };


      // 🚨 [📅 신규 피처] 구글 캘린더 동적 템플릿 URL 프리필(Pre-fill) 생성 엔진
      const handleCalendarSync = (targetType) => {
        setIsCalendarDropdownOpen(false);

        const eventTitle = `[대면보고] ${targetType} 보고_${report.title}`;
        const eventDetails = `• 보고서 원본 링크: ${report.url || "첨부 문서 없음"}\n\n` +
                             `• AI 자동 요약 정보:\n${summaryText || "요약 정보가 제공되지 않은 보고서입니다."}\n\n` +
                             `* 본 대면 보고 일정은 스마트 보고 통합 포털에서 연동 생성되었습니다.`;

        let leaderEmail = "";
        if (Array.isArray(userList)) {
          const foundLeader = userList.find(u => {
            if (targetType === '팀장') return u.role?.includes('팀장') && u.team === report.team;
            if (targetType === '실장') return u.role?.includes('실장') && u.dept === report.dept;
            if (targetType === '본부장') return u.role?.includes('본부장');
            return false;
          });
          if (foundLeader) leaderEmail = foundLeader.email;
        }

        const baseCalendarUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE";
        const finalUrl = `${baseCalendarUrl}` +
                         `&text=${encodeURIComponent(eventTitle)}` +
                         `&details=${encodeURIComponent(eventDetails)}` +
                         (leaderEmail ? `&add=${encodeURIComponent(leaderEmail)}` : "");

        window.open(finalUrl, '_blank');
      };


      const addViewer = (url) => {
        let finalUrl = url;
        if (url.includes('drive.google.com/file/d/')) {
          finalUrl = url.replace(/\/view.*$/, '/preview');
        }
        return finalUrl;
      };

      const saveTodosToDB = (updatedTodos) => {
        google.script.run
          .withFailureHandler((err) => console.error("To-Do 저장 실패:", err))
          .updateReportTodos(report.id, JSON.stringify(updatedTodos));
      };

      const toggleTodo = (id) => {
        const updatedTodos = todos.map(todo => todo.id === id ? { ...todo, completed: !todo.completed } : todo);
        setTodos(updatedTodos); setReport({ ...report, todos: updatedTodos }); saveTodosToDB(updatedTodos); 
      };

      const deleteTodo = (e, id) => {
        e.stopPropagation(); 
        const updatedTodos = todos.filter(todo => todo.id !== id);
        setTodos(updatedTodos); setReport({ ...report, todos: updatedTodos }); saveTodosToDB(updatedTodos);
      };

      const handleAddTodo = () => {
        if (!newTodoText.trim()) return;
        const newTodo = { id: Date.now(), text: newTodoText, completed: false, creatorName: userData.name };
        const updatedTodos = [...todos, newTodo];
        setTodos(updatedTodos); setReport({ ...report, todos: updatedTodos }); saveTodosToDB(updatedTodos);
        setNewTodoText(""); setIsAddingTodo(false);
      };

      // 회의록 로드 (마운트 시)
      useEffect(() => {
        google.script.run
          .withSuccessHandler(records => {
            const list = records || [];
            setMeetingRecords(list);
            if (list.length > 0) setExpandedMeetingIds(new Set([list[0].id]));
            setIsMeetingLoading(false);
          })
          .withFailureHandler(() => setIsMeetingLoading(false))
          .getMeetingRecords(report.id);
      }, [report.id]);

      // 회의록 분석 완료 후 TODO 일괄 등록
      const handleBulkAddTodos = (todoTexts) => {
        if (!todoTexts || todoTexts.length === 0) return;
        const newItems = todoTexts.map((text, i) => ({
          id: Date.now() + i,
          text: text,
          completed: false,
          creatorName: userData.name + ' (회의록)'
        }));
        const updated = [...todos, ...newItems];
        setTodos(updated);
        setReport({ ...report, todos: updated });
        saveTodosToDB(updated);
      };

      const handleSaveSummary = () => {
        if (summaryText === report.aiSummary) { setIsEditingSummary(false); return; }
        Swal.showLoading();
        google.script.run
          .withSuccessHandler((res) => {
            setIsEditingSummary(false); setIsSummaryModified(true); setModifierName(userData.name); 
            setReport({ ...report, aiSummary: res.newSummary, log: res.newLog });
            Swal.fire({ icon: 'success', title: '저장 완료', text: '요약 내용이 성공적으로 수정되었습니다.', confirmButtonColor: '#4F46E5' });
          })
          .withFailureHandler((err) => { Swal.fire({ icon: 'error', title: '오류 발생', text: err.message, confirmButtonColor: '#EF4444' }); })
          .updateReportSummary(report.id, summaryText, userData.name);
      };

      const handleUpdateDocSubmit = () => {
        if ((updateAttachType === 'url' && !updateUrl) || (updateAttachType === 'file' && !updateFile)) {
          Swal.fire({ icon: 'warning', title: '입력 확인', text: '새로운 링크나 파일을 첨부해주세요.', confirmButtonColor: '#4F46E5' });
          return;
        }
        setIsUpdateLoading(true);
        const sendUpdateData = (fileBase64 = null) => {
          const payload = {
            id: report.id, email: userData.email, name: userData.name, office: report.dept, team: report.team,
            reportDate: report.reportDate || report.date.split(" ")[0],
            title: report.title, url: updateAttachType === 'url' ? updateUrl : "",
            fileData: fileBase64, fileName: updateFile ? updateFile.name : "", fileContentType: updateFile ? updateFile.type : "", sharedUsers: "" 
          };
          google.script.run
            .withSuccessHandler((res) => {
              setIsUpdateLoading(false); setIsUpdatingDoc(false);
              setReport({ ...report, url: res.newUrl, aiSummary: res.newSummary, log: report.log + `\n방금 전 - ${userData.name}님이 첨부 문서를 업데이트했습니다.` });
              setSummaryText(res.newSummary); 
              Swal.fire({ icon: 'success', title: '업데이트 완료!', text: '문서가 성공적으로 교체되었습니다.', confirmButtonColor: '#4F46E5' });
            })
            .withFailureHandler((error) => {
              setIsUpdateLoading(false); Swal.fire({ icon: 'error', title: '오류 발생', text: error.message, confirmButtonColor: '#EF4444' });
            })
            .updateReportDocument(payload);
        };
        if (updateAttachType === 'file' && updateFile) {
          const reader = new FileReader(); reader.onload = (e) => sendUpdateData(e.target.result); reader.readAsDataURL(updateFile);
        } else { sendUpdateData(); }
      };

      const rawLogs = report.log ? report.log.split('\n').filter(l => l.trim() !== '') : [];
      const parsedLogs = rawLogs.map((logStr, idx) => {
        const dashIdx = logStr.indexOf(' - ');
        const timeStr = dashIdx > -1 ? logStr.substring(0, dashIdx).trim() : '';
        const contentStr = dashIdx > -1 ? logStr.substring(dashIdx + 3).trim() : logStr;
        let dotColor = "bg-slate-300 border-white";
        if (contentStr.includes('반려')) dotColor = "bg-amber-400 border-amber-100";
        else if (contentStr.includes('승인')) dotColor = "bg-emerald-400 border-emerald-100";
        else if (contentStr.includes('요청')) dotColor = "bg-blue-400 border-blue-100"; 
        else if (contentStr.includes('제출') || contentStr.includes('업데이트') || contentStr.includes('수정')) dotColor = "bg-blue-400 border-blue-100";
        return { id: idx, time: timeStr, content: contentStr, dotColor };
      });

      const openActionModal = (type) => {
        setActionModal({ isOpen: true, type: type, comment: '' });
      };

      const submitAction = () => {
        setIsActionSubmitting(true);
        google.script.run
          .withSuccessHandler((res) => {
            setIsActionSubmitting(false);
            setActionModal({ isOpen: false, type: '', comment: '' });
            Swal.fire('처리 완료', `결재 상태가 업데이트 되었습니다.`, 'success').then(() => goBack(true)); 
          })
          .withFailureHandler((err) => {
            setIsActionSubmitting(false);
            Swal.fire('오류', err.message, 'error');
          })
          .updateReportStatus(report.id, actionModal.type, actionModal.comment);
      };

      const modalConfig = {
        'APPROVE': { bg: 'bg-emerald-50', text: 'text-emerald-800', btn: 'bg-emerald-500 hover:bg-emerald-600', icon: 'check_circle', title: '보고서 승인', placeholder: '승인 의견 (선택사항)', btnText: '승인 완료' },
        'REJECT': { bg: 'bg-amber-50', text: 'text-amber-800', btn: 'bg-amber-500 hover:bg-amber-600', icon: 'edit_document', title: '피드백 및 반려', placeholder: '피드백 및 반려 사유 (권장)', btnText: '피드백 전달' },
        'RESUBMIT': { bg: 'bg-blue-50', text: 'text-blue-800', btn: 'bg-blue-600 hover:bg-blue-700', icon: 'send', title: '재승인 요청', placeholder: '수정 사항 및 재승인 코멘트를 남겨주세요.', btnText: '재승인 올리기' }
      };
      const activeConfig = modalConfig[actionModal.type] || modalConfig['APPROVE'];

      const groupedUsers = {};
      if (Array.isArray(userList)) {
        userList.forEach(u => {
          if (u.email === userData.email) return; 
          
          const keyword = searchTerm.toLowerCase().trim();
          const isMatch = !keyword || 
                          u.name.toLowerCase().includes(keyword) || 
                          (u.team && u.team.toLowerCase().includes(keyword)) || 
                          u.email.toLowerCase().includes(keyword);
          
          if (isMatch) {
            let t;
            if (u.team) t = u.team;
            else if (u.role === '본부장' || u.role === '실장') t = u.role;
            else t = '소속 미지정';
            if (!groupedUsers[t]) groupedUsers[t] = [];
            groupedUsers[t].push(u);
          }
        });
      }

      const toggleUser = (user) => {
        const isExist = selectedSharedUsers.some(u => u.email === user.email);
        if (isExist) setSelectedSharedUsers(selectedSharedUsers.filter(u => u.email !== user.email));
        else setSelectedSharedUsers([...selectedSharedUsers, user]);
      };

      const toggleTeam = (teamUsers) => {
        const allSelected = teamUsers.every(u => selectedSharedUsers.some(s => s.email === u.email));
        if (allSelected) {
          setSelectedSharedUsers(selectedSharedUsers.filter(s => !teamUsers.some(u => u.email === s.email)));
        } else {
          const newUsers = teamUsers.filter(u => !selectedSharedUsers.some(s => s.email === u.email));
          setSelectedSharedUsers([...selectedSharedUsers, ...newUsers]);
        }
      };

      const handleAddSharedUsers = () => {
        if (selectedSharedUsers.length === 0) {
          Swal.fire('알림', '추가할 공유 대상자를 선택해주세요.', 'info');
          return;
        }

        setIsSharing(true);
        const newEmailsStr = selectedSharedUsers.map(u => u.email).join(', ');

        google.script.run
          .withSuccessHandler((res) => {
            setIsSharing(false);
            setIsOrgModalOpen(false);
            setSelectedSharedUsers([]); 
            setSearchTerm(""); 
            if (res.success) {
              Swal.fire('공유 완료', '선택하신 인원에게 권한이 부여되었습니다. (이메일 알림 없이 조용히 추가됨)', 'success');
            } else {
              Swal.fire('오류', res.message, 'error');
            }
          })
          .withFailureHandler((err) => {
            setIsSharing(false);
            Swal.fire('오류', err.message, 'error');
          })
          .addSharedUsersToReport(report.id, newEmailsStr);
      };

      // ── 타임라인 패널 렌더러
      const renderTimelinePanel = () => {
        const VISIBLE = 5;
        const tl = projectTimeline || {};
        const msList = tl.milestones || [];
        const canEdit = tl.canEdit || false;
        const hasProject = !!tl.projectId;
        const visible = isTimelineExpanded ? msList : msList.slice(0, VISIBLE);

        const refetchTimeline = () => {
          google.script.run
            .withSuccessHandler(r => setProjectTimeline(r))
            .getProjectTimeline(report.id);
        };

        const handleStartProject = () => {
          setIsMsSaving(true);
          const msStatus = report.status && report.status.includes('승인 완료') ? 'done' : report.status && report.status.includes('대기') ? 'active' : 'upcoming';
          google.script.run
            .withSuccessHandler(res => { setIsMsSaving(false); if (res.success) refetchTimeline(); else Swal.fire('오류', res.message, 'error'); })
            .withFailureHandler(err => { setIsMsSaving(false); Swal.fire('오류', err.message, 'error'); })
            .addMilestone({ anchorReportId: report.id, type: 'report', title: report.title, date: report.reportDate || '', linkedReportId: report.id, status: msStatus });
        };

        const handleAddMs = () => {
          if (!newMs.title.trim()) { Swal.fire('알림', '마일스톤 제목을 입력하세요.', 'info'); return; }
          setIsMsSaving(true);
          google.script.run
            .withSuccessHandler(res => { setIsMsSaving(false); setIsAddingMs(false); setNewMs({ title: '', date: '', type: 'event', linkedReportId: '', status: 'upcoming' }); if (res.success) refetchTimeline(); else Swal.fire('오류', res.message, 'error'); })
            .withFailureHandler(err => { setIsMsSaving(false); Swal.fire('오류', err.message, 'error'); })
            .addMilestone({ ...newMs, projectId: tl.projectId });
        };

        const handleSaveEdit = (msId) => {
          setIsMsSaving(true);
          google.script.run
            .withSuccessHandler(res => { setIsMsSaving(false); setEditingMsId(null); setEditMsData({}); if (res.success) refetchTimeline(); else Swal.fire('오류', res.message, 'error'); })
            .withFailureHandler(err => { setIsMsSaving(false); Swal.fire('오류', err.message, 'error'); })
            .updateMilestone(msId, editMsData);
        };

        const handleDeleteMs = (msId) => {
          Swal.fire({ title: '마일스톤 삭제', text: '삭제하면 복구할 수 없습니다.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonText: '취소', confirmButtonText: '삭제' }).then(r => {
            if (!r.isConfirmed) return;
            google.script.run
              .withSuccessHandler(res => { if (res.success) refetchTimeline(); else Swal.fire('오류', res.message, 'error'); })
              .withFailureHandler(err => Swal.fire('오류', err.message, 'error'))
              .deleteMilestone(msId);
          });
        };

        const stCfg = {
          done:     { dot: 'bg-emerald-500', badge: 'text-emerald-700 bg-emerald-50',  label: '완료' },
          active:   { dot: 'bg-indigo-500',  badge: 'text-indigo-700 bg-indigo-50',    label: '진행중' },
          upcoming: { dot: 'border-2 border-slate-300 bg-white', badge: 'text-slate-500 bg-slate-100', label: '예정' },
        };

        if (isTimelineLoading) return (
          <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <div className="flex items-center gap-2 text-sm text-slate-400">
              <div className="w-4 h-4 border-2 border-indigo-300 border-t-transparent rounded-full animate-spin"></div>
              워크플로우 로딩 중...
            </div>
          </div>
        );

        return (
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            {/* 헤더 */}
            <div className="px-5 py-3.5 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
              <div>
                <div className="flex items-center gap-1.5 text-sm font-bold text-slate-700">
                  <Icon name="timeline" className="text-indigo-500 text-[18px]" /> 프로젝트 워크플로우
                </div>
                {msList.length > 0 && <div className="text-[10px] text-slate-400 mt-0.5">{msList.filter(m=>m.status==='done').length} / {msList.length} 완료</div>}
              </div>
              {hasProject && canEdit && !isAddingMs && (
                <button onClick={() => setIsAddingMs(true)} className="text-[11px] font-bold text-indigo-500 hover:text-indigo-700 px-2 py-0.5 rounded-lg hover:bg-indigo-50 transition-colors">+ 추가</button>
              )}
            </div>

            {/* 프로젝트 없음 */}
            {!hasProject && (
              <div className="p-5 text-center">
                <Icon name="timeline" className="text-slate-300 text-[32px] block mx-auto mb-2" />
                <p className="text-[12px] text-slate-400 mb-3">등록된 워크플로우가 없습니다.</p>
                {tl.canStart && (
                  <button onClick={handleStartProject} disabled={isMsSaving} className="px-4 py-2 bg-indigo-600 text-white text-[12px] font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-sm disabled:opacity-50">{isMsSaving ? '생성 중...' : '새 프로젝트 타임라인 시작'}</button>
                )}
              </div>
            )}

            {/* 마일스톤 추가 폼 */}
            {isAddingMs && hasProject && (
              <div className="px-4 py-3 bg-indigo-50/50 border-b border-indigo-100 space-y-2">
                <input type="text" value={newMs.title} onChange={e => setNewMs({...newMs, title: e.target.value})} placeholder="마일스톤 제목 *" className="w-full px-3 py-2 text-[12px] border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" />
                <div className="flex gap-2">
                  <input type="date" value={newMs.date} onChange={e => setNewMs({...newMs, date: e.target.value})} className="flex-1 px-2 py-1.5 text-[11px] border border-slate-200 rounded-lg focus:outline-none bg-white" />
                  <select value={newMs.status} onChange={e => setNewMs({...newMs, status: e.target.value})} className="px-2 py-1.5 text-[11px] border border-slate-200 rounded-lg focus:outline-none bg-white">
                    <option value="upcoming">예정</option><option value="active">진행중</option><option value="done">완료</option>
                  </select>
                </div>
                <div className="flex gap-2">
                  <select value={newMs.type} onChange={e => setNewMs({...newMs, type: e.target.value, linkedReportId: ''})} className="px-2 py-1.5 text-[11px] border border-slate-200 rounded-lg focus:outline-none bg-white">
                    <option value="event">이정표</option><option value="report">보고서 연결</option>
                  </select>
                  {newMs.type === 'report' && (
                    <select value={newMs.linkedReportId} onChange={e => { const r = relatedReports.find(r => r.id === e.target.value); setNewMs({...newMs, linkedReportId: e.target.value, title: newMs.title || (r ? r.title : '')}); }} className="flex-1 px-2 py-1.5 text-[11px] border border-slate-200 rounded-lg focus:outline-none bg-white">
                      <option value="">보고서 선택...</option>
                      {relatedReports.map(r => <option key={r.id} value={r.id}>{r.title.slice(0,25)}{r.title.length>25?'…':''}</option>)}
                    </select>
                  )}
                </div>
                <div className="flex gap-2">
                  <button onClick={handleAddMs} disabled={isMsSaving} className="flex-1 py-1.5 bg-indigo-600 text-white text-[11px] font-bold rounded-lg hover:bg-indigo-700 disabled:opacity-50 transition-colors">{isMsSaving ? '저장 중...' : '저장'}</button>
                  <button onClick={() => { setIsAddingMs(false); setNewMs({ title: '', date: '', type: 'event', linkedReportId: '', status: 'upcoming' }); }} className="px-3 py-1.5 bg-white border border-slate-200 text-slate-500 text-[11px] font-bold rounded-lg hover:bg-slate-50 transition-colors">취소</button>
                </div>
              </div>
            )}

            {/* 마일스톤 목록 */}
            {msList.length > 0 && (
              <div className="px-4 pt-4 pb-2">
                {visible.map((ms, idx) => {
                  const isCurrent = ms.linkedReportId === report.id;
                  const cfg = stCfg[ms.status] || stCfg.upcoming;
                  const isEditing = editingMsId === ms.id;
                  return (
                    <div key={ms.id} className={`relative flex gap-3 group ${idx < visible.length - 1 ? 'pb-4' : 'pb-2'}`}>
                      {idx < visible.length - 1 && <div className="absolute left-[7px] top-4 bottom-0 w-px bg-slate-200"></div>}
                      <div className="flex-shrink-0 mt-0.5 z-10">
                        <div className={`w-3.5 h-3.5 rounded-full ${cfg.dot} ${ms.status === 'active' ? 'ring-2 ring-indigo-200' : ''}`}></div>
                      </div>
                      <div className={`flex-1 min-w-0 ${isCurrent ? 'bg-indigo-50/70 rounded-xl px-2.5 py-2 -mx-1 -my-1' : ''}`}>
                        {isEditing ? (
                          <div className="space-y-1.5">
                            <input type="text" value={editMsData.title ?? ms.title} onChange={e => setEditMsData({...editMsData, title: e.target.value})} className="w-full px-2 py-1 text-[11px] border border-indigo-300 rounded-lg focus:outline-none bg-white" />
                            <div className="flex gap-1.5">
                              <input type="date" value={editMsData.date ?? ms.date} onChange={e => setEditMsData({...editMsData, date: e.target.value})} className="flex-1 px-1.5 py-1 text-[10px] border border-slate-200 rounded-lg focus:outline-none bg-white" />
                              <select value={editMsData.status ?? ms.status} onChange={e => setEditMsData({...editMsData, status: e.target.value})} className="px-1.5 py-1 text-[10px] border border-slate-200 rounded-lg focus:outline-none bg-white">
                                <option value="upcoming">예정</option><option value="active">진행중</option><option value="done">완료</option>
                              </select>
                            </div>
                            <div className="flex gap-1.5">
                              <button onClick={() => handleSaveEdit(ms.id)} disabled={isMsSaving} className="flex-1 py-1 bg-indigo-600 text-white text-[10px] font-bold rounded-md disabled:opacity-50">저장</button>
                              <button onClick={() => { setEditingMsId(null); setEditMsData({}); }} className="px-2 py-1 bg-white border border-slate-200 text-slate-500 text-[10px] font-bold rounded-md">취소</button>
                            </div>

  .timer{font-family:monospace;font-size:28px;font-weight:700;color:#1c2b44;text-align:center;margin-bottom:14px;font-variant-numeric:tabular-nums}
  canvas{width:100%;height:64px;border-radius:10px;background:#0f172a;display:block;margin-bottom:16px}
  .spin-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px 0}
  .spinner{width:48px;height:48px;border-radius:50%;border:3px solid #e0e7ff;border-top-color:#6366f1;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 14px;font-size:12.5px;color:#dc2626;line-height:1.55;margin-bottom:16px}
  .ok{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;font-size:13px;color:#166534;margin-bottom:16px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div id="v-idle">
    <div class="hdr"><span class="dot"></span> 회의록 녹음</div>
    <div class="info">마이크로 회의 내용을 녹음합니다.<br>분석 후 녹음 파일은 즉시 삭제됩니다. 최대 90분.<small>※ 브라우저 알림창에서 마이크 허용을 눌러주세요.</small></div>
    <div id="idle-err" class="err" style="display:none"></div>
    <button class="btn btn-red" id="btn-start">&#9679; 녹음 시작</button>
  </div>
  <div id="v-rec" style="display:none">
    <div class="rec-hdr"><div class="rec-dot"></div><span class="rec-lbl">녹음 중</span></div>
    <div class="timer" id="timer">00:00</div>
    <canvas id="wv"></canvas>
    <p style="font-size:11.5px;color:#94a3b8;text-align:center;margin-bottom:16px">회의가 끝나면 정지 버튼을 눌러주세요</p>
    <button class="btn btn-dark" id="btn-stop">&#9632; 녹음 정지 및 전송</button>
  </div>
  <div id="v-send" style="display:none">
    <div class="spin-wrap">
      <div class="spinner"></div>
      <div style="font-size:15px;font-weight:700">전송 중...</div>
      <div style="font-size:12.5px;color:#7b8eaa;text-align:center;line-height:1.55">메인 창으로 전송하고 있습니다.<br>잠시 후 창이 자동으로 닫힙니다.</div>
    </div>
  </div>
  <div id="v-done" style="display:none">
    <div class="ok">✅ 전송 완료!<br><small style="font-size:11px">메인 창에서 AI 분석이 시작됩니다.</small></div>
    <button class="btn btn-gray" id="btn-close">창 닫기</button>
  </div>
  <div id="v-err" style="display:none">
    <p style="font-weight:700;text-align:center;margin-bottom:12px;color:#ef4444">⚠ 오류 발생</p>
    <div class="err" id="err-msg"></div>
    <button class="btn btn-gray" id="btn-retry">다시 시도</button>
  </div>
</div>
<script>
  const MAX=90*60;
  let mr=null,st=null,ch=[],ti=null,ai=null,el=0;
  function show(id){['idle','rec','send','done','err'].forEach(v=>document.getElementById('v-'+v).style.display=(v===id?'':'none'));}
  function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'):String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
  function stopAll(){clearInterval(ti);cancelAnimationFrame(ai);if(st)st.getTracks().forEach(t=>t.stop());}
  function wave(s){try{const ac=new AudioContext(),an=ac.createAnalyser();an.fftSize=256;ac.createMediaStreamSource(s).connect(an);const cv=document.getElementById('wv'),c=cv.getContext('2d');cv.width=cv.offsetWidth*2;cv.height=128;function d(){const W=cv.width,H=cv.height,da=new Uint8Array(an.frequencyBinCount);an.getByteFrequencyData(da);c.clearRect(0,0,W,H);const bw=W/da.length*2.2;da.forEach((v,i)=>{const bh=(v/255)*H;c.fillStyle='rgba(239,68,68,'+(0.3+(v/255)*0.7)+')';c.fillRect(i*(bw+1),H-bh,bw,bh);});ai=requestAnimationFrame(d);}d();}catch(e){}}
  document.getElementById('btn-start').onclick=async function(){
    document.getElementById('idle-err').style.display='none';
    try{
      st=await navigator.mediaDevices.getUserMedia({audio:true});
      ch=[];
      const mt=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
      mr=new MediaRecorder(st,{mimeType:mt,audioBitsPerSecond:32000});
      mr.ondataavailable=e=>{if(e.data.size>0)ch.push(e.data);};
      mr.onstop=()=>send(mt.split(';')[0]);
      mr.start(1000);el=0;show('rec');
      ti=setInterval(()=>{el++;document.getElementById('timer').textContent=fmt(el);if(el>=MAX)document.getElementById('btn-stop').click();},1000);
      wave(st);
    }catch(e){
      let msg='마이크를 시작할 수 없습니다.';
      if(e.name==='NotFoundError')msg='마이크를 찾을 수 없습니다.';
      else if(e.name==='NotAllowedError'||e.name==='SecurityError')msg='마이크 접근이 거부되었습니다. 주소창 왼쪽 아이콘을 클릭해 마이크를 허용해주세요.';
      const el2=document.getElementById('idle-err');el2.textContent=msg;el2.style.display='';
    }
  };
  document.getElementById('btn-stop').onclick=function(){stopAll();if(mr&&mr.state!=='inactive')mr.stop();show('send');};
  function send(mt){
    const blob=new Blob(ch,{type:mt});
    const r=new FileReader();
    r.onload=function(){
      const b64=r.result.split(',')[1];
      if(window.opener&&!window.opener.closed){
        window.opener.postMessage({type:'AUDIO_READY',base64:b64,mimeType:mt},'*');
        show('done');
        setTimeout(()=>{try{window.close();}catch(e){}},1500);
      }else{
        document.getElementById('err-msg').textContent='메인 창을 찾을 수 없습니다.';show('err');
      }
    };
    r.onerror=function(){document.getElementById('err-msg').textContent='오디오 데이터 처리 중 오류가 발생했습니다.';show('err');};
    r.readAsDataURL(blob);
  }
  document.getElementById('btn-close').onclick=()=>{try{window.close();}catch(e){}};
  document.getElementById('btn-retry').onclick=()=>{ch=[];show('idle');};
<\/script>
</body>
</html>`;

                  const popup = window.open('', 'meeting_recorder', 'width=430,height=560,resizable=yes,scrollbars=no');

                      .analyzeMeetingAudio(base64, mimeType.split(';')[0], report.id);

                  reader.readAsDataURL(blob);

                          <Icon name="mic" className="text-red-500" /> 회의록 분석

                      )}

                      <div className="px-6 py-6">

                        {/* IDLE · 실시간 녹음 탭 → 팝업 방식 */}
                        {recState === 'idle' && inputMode === 'record' && (
                          <div className="space-y-5">
                            <div className="flex items-start gap-3 bg-slate-50 p-4 rounded-xl border border-slate-100 text-sm text-slate-600 leading-relaxed">
                              <Icon name="info" className="text-slate-400 text-[18px] shrink-0 mt-0.5" />
                              <span>별도 팝업 창에서 마이크로 녹음합니다. 녹음 파일은 분석 후 즉시 삭제됩니다. 최대 90분.<br/>
                              <span className="text-xs text-slate-400 mt-1 block">※ 팝업이 차단될 경우 주소창의 팝업 차단 아이콘을 클릭하여 허용해주세요.</span></span>
                            </div>
                            {errorMsg && (
                              <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-sm text-amber-800">

                            <button onClick={openRecorderPopup} className="w-full py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition-colors shadow-sm flex items-center justify-center gap-2">

                        {isWaiting && (

                              <Icon name="mic" className="text-red-500 text-[28px]" />
                            </div>
                            <p className="font-bold text-slate-800">팝업 창에서 녹음 중</p>
                            <p className="text-sm text-slate-500 leading-relaxed">열린 팝업 창에서 녹음을 진행해주세요.<br/>녹음이 끝나면 결과가 자동으로 여기에 표시됩니다.</p>
                            <div className="flex justify-center gap-1.5 pt-2">
                              {[0,1,2].map(i => (

                                <p className="text-sm text-slate-700 leading-relaxed bg-slate-50 p-3.5 rounded-xl border border-slate-100 whitespace-pre-wrap">{result.summary}</p>
                              </div>

              };
              return <MeetingRecorderModal />;
            })()}

            {/* 리더십 피드백 진행 이력 */}
            {(() => {

                    <div className="flex items-center gap-2 flex-wrap justify-end">
                      {/* 보고자: 팀장 대기 단계에서만 전환/삭제 */}
                      {isMyReport && report.status === '[팀장 대기]' && (
                        <>
                          <button
                            onClick={() => {
                              Swal.fire({
                                title: '완료 보고서로 전환',
                                text: '해당 보고서를 보고가 완료된 보고서로 전환하시겠습니까?',

                            className="px-3.5 py-1.5 bg-white border border-emerald-200 text-emerald-600 rounded-xl text-xs font-bold hover:bg-emerald-50 transition-colors flex items-center gap-1.5 shadow-sm"
